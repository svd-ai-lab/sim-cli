driver: ls_dyna
# LS-DYNA has no Python SDK imported into sim — keyword files are run
# via the lsdyna executable as a subprocess. No sdk_package needed.

profiles:
  - name: ls_dyna_r14_0
    solver_versions: ["R14.0"]
    active_sdk_layer: null
    active_solver_layer: "14.0"
    notes: |
      LS-DYNA R14.0 (Ansys 2024 R1). Single/double precision executables.
      Command: lsdyna_sp.exe i=<file> or lsdyna_dp.exe i=<file>
      Output: d3plot, d3hsp, messag, glstat, matsum files.
