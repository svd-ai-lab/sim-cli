# sim-cli — Fluent driver compatibility matrix.
#
# Single source of truth for which (Fluent solver version, ansys-fluent-core
# SDK version) combinations this driver supports. Consumed by:
#   - sim/compat.py loader   (catalogue + resolution by detected version)
#   - sim check fluent       (printing the install/profile table)
#   - sim-skills/fluent/     (which skill content to surface for this profile)
#
# See sim-cli/docs/architecture/version-compat.md for the full schema.

driver: fluent
sdk_package: ansys-fluent-core

profiles:

  - name: pyfluent_0_38_modern
    sdk: ">=0.38,<0.39"
    solver_versions: ["24.2", "25.1", "25.2"]
    active_sdk_layer: "0.38"
    active_solver_layer: "25.2"
    notes: |
      Uses .general.material accessor (PyFluent 0.38+).
      Fluent 24.1 dropped upstream — DO NOT pick this profile for 24.1.

  - name: pyfluent_0_37_legacy
    sdk: ">=0.37,<0.38"
    solver_versions: ["24.1", "24.2", "25.1"]
    active_sdk_layer: "0.37"
    notes: |
      Direct cell_zone.<zone>.material accessor.
      Last profile that supports Fluent 24.1.
