# sim-cli — MAPDL driver compatibility matrix.
#
# PyMAPDL is a gRPC client for Ansys MAPDL (ANSYS<ver>.exe -grpc).
# The SDK (ansys-mapdl-core) ships on a ~quarterly cadence; one SDK
# release typically supports the current + 3 prior Ansys unified
# releases (e.g., PyMAPDL 0.72 supports 24.1 through 25.2).

driver: mapdl
sdk_package: ansys-mapdl-core

profiles:

  - name: mapdl_v24_1
    sdk: ">=0.68,<0.80"
    solver_versions: ["24.1", "24.1.0", "2024 R1"]
    active_sdk_layer: "0.72"
    active_solver_layer: "24.1"
    notes: |
      PyMAPDL 0.68–0.79 with Ansys 24.1.
      launch_mapdl() auto-detects via AWP_ROOT241.
      Verified with pymapdl 0.72.1 + Ansys 24.1 on Windows.

  - name: mapdl_v24_2
    sdk: ">=0.68,<0.80"
    solver_versions: ["24.2", "24.2.0", "2024 R2"]
    active_sdk_layer: "0.72"
    active_solver_layer: "24.2"
    notes: |
      PyMAPDL 0.68+ with Ansys 24.2. launch_mapdl() auto-detects via
      AWP_ROOT242.

  - name: mapdl_v25_1
    sdk: ">=0.68,<0.80"
    solver_versions: ["25.1", "25.1.0", "2025 R1"]
    active_sdk_layer: "0.72"
    active_solver_layer: "25.1"
    notes: |
      PyMAPDL 0.68+ with Ansys 25.1.

  - name: mapdl_v25_2
    sdk: ">=0.68,<0.80"
    solver_versions: ["25.2", "25.2.0", "2025 R2"]
    active_sdk_layer: "0.72"
    active_solver_layer: "25.2"
    notes: |
      PyMAPDL 0.68+ with Ansys 25.2.
