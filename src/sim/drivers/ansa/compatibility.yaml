# sim-cli — BETA CAE ANSA driver compatibility matrix.
#
# ANSA has NO Python binding usable from outside its own process. The
# scripting interface is the `ansa` Python module, but it is ONLY
# importable inside an ANSA-spawned interpreter (it links to the
# ANSA C++ runtime). The driver therefore drives ANSA via:
#
#     ansa64.bat -execscript "script.py|main()" -nogui
#
# That makes ANSA an SDK-less driver in M1 terms: the compatibility.yaml
# is metadata-only (no SDK to pip install, no runner subprocess to spawn
# from a profile env). The server falls through to the legacy inline
# AnsaDriver path on /connect; the inline driver shells out to ansa64.bat.
#
# Detection inputs (see driver.py detect_installed):
#   - ANSA_EXEC_DIR / ANSA_EXEC_PATH env vars
#   - shutil.which("ansa64.bat")
#   - C:\Program Files\BETA\ansa_v25.0.0\ansa64.bat (and 4 other drives)
#
# Version normalization: BETA uses semver-ish ansa_v25.0.0 / ansa_v24.1.2
# in the install dir name. We use the X.Y.Z form as solver_versions.

driver: ansa
# (no sdk_package — ANSA has no Python wrapper outside its own process)

profiles:

  - name: ansa_v25_0
    solver_versions: ["25.0.0", "25.0"]
    skill_revision: v1
    extra:
      release_label: "ansa_v25.0.0"
    notes: |
      BETA CAE ANSA 25.0. Latest tested.
      Metadata-only profile — uses the inline AnsaDriver subprocess
      backend (ansa64.bat -execscript -nogui). No env to bootstrap.

  - name: ansa_v24_1
    solver_versions: ["24.1.0", "24.1"]
    skill_revision: v1
    extra:
      release_label: "ansa_v24.1.0"
    notes: |
      BETA CAE ANSA 24.1.

  - name: ansa_v23_1
    solver_versions: ["23.1.0", "23.1"]
    skill_revision: v1
    extra:
      release_label: "ansa_v23.1.0"
    notes: |
      BETA CAE ANSA 23.1.

deprecated: []
